{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | Women Safety Admin Portal</title>
    <link rel="stylesheet" href="{% static 'admin_portal/css/portal.css' %}">
</head>
<body class="portal-auth-page">
    <main class="portal-auth-shell portal-auth-shell-centered">
        <section class="portal-auth-card portal-auth-card-wide">
            <p class="portal-card-label">{{ page_kicker }}</p>
            <h1>This tool is not available for your role</h1>
            <p class="portal-auth-copy portal-auth-copy-muted">{{ page_summary }}</p>
            <div class="portal-chip-row">
                <a href="{% url 'admin-dashboard' %}" class="portal-auth-link">Go to my dashboard</a>
                <a href="{% url 'admin-login' %}" class="portal-auth-link">Return to sign in</a>
            </div>
        </section>
    </main>
</body>
</html>
