  http: ^1.5.0
  shared_preferences: ^2.5.5
  webview_flutter: ^4.10.0
  flutter_map: ^8.2.1
  latlong2: ^0.9.1
  flutter_map_cache: ^2.0.0
  dio_cache_interceptor: ^4.0.3
  path_provider: ^2.1.5
  

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
